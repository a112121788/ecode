name: Build Docs and Publish Branch

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-branch
  cancel-in-progress: false

jobs:
  publish:
    name: Build docs/ and publish dist to docs branch
    runs-on: ubuntu-latest
    env:
      # Project Pages are served from /<repository>/ by default.
      EXPECTED_VITEPRESS_BASE: ${{ format('/{0}/', github.event.repository.name) }}
      VITEPRESS_BASE: ${{ format('/{0}/', github.event.repository.name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Verify built docs base path
        run: |
          set -euo pipefail
          grep -F "\"base\":\"${EXPECTED_VITEPRESS_BASE}\"" docs/.vitepress/dist/index.html

      - name: Publish compiled docs to docs branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          test -f docs/.vitepress/dist/index.html
          cp -R docs/.vitepress/dist/. "$publish_dir"

          cd "$publish_dir"
          git init --initial-branch=docs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy docs from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin docs
